name: FX Alert Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # 5分ごと
  workflow_dispatch:        # 手動実行も可能

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # state/notified.jsonをコミットするため
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          DISCORD_WEBHOOK_LOW: ${{ secrets.DISCORD_WEBHOOK_LOW }}
          DISCORD_WEBHOOK_MID: ${{ secrets.DISCORD_WEBHOOK_MID }}
          DISCORD_WEBHOOK_HIGH: ${{ secrets.DISCORD_WEBHOOK_HIGH }}
        run: python -m src.main

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/notified.json
          git diff --staged --quiet || git commit -m "Update state [skip ci]"
          git push
