# レイヤ1：必須キーワード（OR条件）
required_keywords:
  - "為替"
  - "ドル円"
  - "ドル/円"
  - "USD/JPY"
  - "介入"
  - "口先介入"
  - "円安"
  - "円高"

# レイヤ2：人物マッチ（OR条件）
target_persons:
  japan:
    high_priority:
      - "片山"          # 片山さつき財務相
      - "三村"          # 三村淳財務官
    medium_priority:
      - "植田"          # 植田和男日銀総裁
      - "氷見野"
      - "内田"
    low_priority:
      - "高市"          # 首相
    role_keywords:      # 役職での言及もキャッチ
      - "財務相"
      - "財務官"
      - "日銀総裁"
      - "日銀副総裁"
  us:
    high_priority:
      - "ベッセント"
      - "パウエル"
    role_keywords:
      - "FRB議長"
      - "米財務長官"

# レイヤ3：Lv判定キーワード（強度順、Lv4を最優先で判定）
lv_keywords:
  lv4:
    - "断固"
    - "断固たる"
    - "いつでも対応"
    - "最後の退避"
    - "退避勧告"
    - "行動するとき"
    - "行動する用意"
  lv3:
    - "フリーハンド"
    - "排除しない"
    - "あらゆる手段"
    - "準備はできて"
    - "タイミング"
    - "その時が"
  lv2:
    - "過度な変動"
    - "投機的"
    - "憂慮"
    - "ファンダメンタルズに沿わない"
    - "一方的"
  # Lv1は通常コメントなので、明示マッチではなく「Lv2〜4のいずれにもマッチしない」場合のデフォルト

# 除外パターン（過去発言の引用などを除外）
exclude_patterns:
  - "過去に.*?発言"
  - "以前の.*?発言"
  - "かつて.*?述べた"
